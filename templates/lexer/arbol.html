{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árbol Sintáctico</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --border: #334155;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-soft: rgba(56, 189, 248, 0.12);
            --danger: #f87171;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 45%, #020617 100%);
            color: var(--text);
        }

        .page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 20px 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.8rem, 3vw, 3rem);
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
        }

        .actions a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .panel {
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 30px 80px rgba(2, 6, 23, 0.45);
        }

        .canvas-panel {
            padding: 10px;
            overflow: hidden;
        }

        .canvas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 16px 18px 0;
        }

        .canvas-header h2 {
            margin: 0;
            font-size: 1.1rem;
        }

        .canvas-note {
            color: var(--muted);
            font-size: 0.92rem;
        }

        #canvas {
            width: 100%;
            min-height: 700px;
            padding: 12px;
        }

        .node circle {
            fill: #fff;
            stroke: var(--accent);
            stroke-width: 3px;
        }

        .node text {
            fill: var(--text);
            font: 600 13px Inter, sans-serif;
        }

        .link {
            fill: none;
            stroke: rgba(148, 163, 184, 0.4);
            stroke-width: 2px;
        }

        svg {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.25), rgba(2, 6, 23, 0.3));
            border-radius: 16px;
        }

        .canvas-panel.full-width {
            width: 100%;
        }

        @media (max-width: 1100px) {
            .page {
                padding: 24px 14px 32px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div>
                <h1>Árbol Sintáctico</h1>
                <p class="subtitle"></p>
            </div>
           
        </div>

        <section class="panel canvas-panel full-width">
            <div class="canvas-header">
                <h2>Vista del arbol</h2>
                <span class="canvas-note"></span>
            </div>
            <div id="canvas"></div>
        </section>
    </div>

    <script>
        const treeData = {{ json_data|safe }};
        const margin = { top: 40, right: 90, bottom: 50, left: 90 };
        const width = 1200 - margin.left - margin.right;
        const height = 760 - margin.top - margin.bottom;

        const svg = d3.select('#canvas')
            .append('svg')
            .attr('viewBox', [0, 0, width + margin.left + margin.right, height + margin.top + margin.bottom])
            .append('g')
            .attr('transform', `translate(${margin.left},${margin.top})`);

        const root = d3.hierarchy(treeData);
        const treeLayout = d3.tree().size([width, height]);
        treeLayout(root);

        svg.selectAll('.link')
            .data(root.links())
            .enter()
            .append('path')
            .attr('class', 'link')
            .attr('d', d3.linkVertical().x(d => d.x).y(d => d.y));

        const node = svg.selectAll('.node')
            .data(root.descendants())
            .enter()
            .append('g')
            .attr('class', 'node')
            .attr('transform', d => `translate(${d.x},${d.y})`);

        node.append('circle').attr('r', 10);
        node.append('text')
            .attr('dy', '.35em')
            .attr('y', d => d.children ? -20 : 20)
            .style('text-anchor', 'middle')
            .text(d => d.data.name);
    </script>
</body>
</html>
